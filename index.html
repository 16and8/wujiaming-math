<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数学小测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 48px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            text-align: center;
            max-width: 400px;
            width: 90%;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-4px);
        }

        .emoji {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .question {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 15px;
            color: #888;
            margin-bottom: 32px;
        }

        .input-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 24px;
        }

        input {
            width: 120px;
            padding: 14px 20px;
            font-size: 20px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            text-align: center;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: #667eea;
        }

        button {
            padding: 14px 28px;
            font-size: 18px;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: opacity 0.3s, transform 0.15s;
        }

        button:hover {
            opacity: 0.9;
        }

        button:active {
            transform: scale(0.96);
        }

        .message {
            margin-top: 20px;
            font-size: 18px;
            font-weight: 600;
            min-height: 30px;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .message.show {
            opacity: 1;
        }

        .message.error {
            color: #e74c3c;
        }

        .message.success {
            color: #27ae60;
        }

        /* 成功弹窗特效 */
        .celebration {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 999;
            justify-content: center;
            align-items: center;
        }

        .celebration.show {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 24px;
            padding: 48px 40px;
            text-align: center;
            max-width: 360px;
            width: 90%;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .modal .big-emoji {
            font-size: 80px;
            margin-bottom: 16px;
        }

        .modal h2 {
            font-size: 32px;
            color: #1a1a2e;
            margin-bottom: 8px;
        }

        .modal p {
            font-size: 16px;
            color: #666;
            margin-bottom: 24px;
        }

        .modal button {
            padding: 12px 36px;
        }

        /* 五彩纸屑 */
        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
            overflow: hidden;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            opacity: 0;
            animation: confettiFall 2.5s ease-in forwards;
        }

        @keyframes confettiFall {
            0% {
                opacity: 1;
                transform: translateY(-20px) rotate(0deg);
            }
            100% {
                opacity: 0;
                transform: translateY(100vh) rotate(720deg);
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="emoji">🧮</div>
        <div class="question">1 + 1 = ？</div>
        <p class="subtitle">答对有小惊喜哦 🎉</p>

        <div class="input-group">
            <input type="number" id="answerInput" placeholder="?" autofocus>
            <button onclick="checkAnswer()">确认</button>
        </div>

        <div class="message" id="message"></div>
    </div>

    <!-- 弹窗 -->
    <div class="celebration" id="celebration">
        <div class="modal">
            <div class="big-emoji">🌟</div>
            <h2>吴家明真棒！</h2>
            <p>答对了！你太厉害了 👏</p>
            <button onclick="closeCelebration()">再玩一次</button>
        </div>
    </div>

    <!-- 五彩纸屑容器 -->
    <div class="confetti-container" id="confettiContainer"></div>

    <script>
        function checkAnswer() {
            const input = document.getElementById('answerInput');
            const message = document.getElementById('message');
            const answer = parseInt(input.value);

            if (answer === 2) {
                message.className = 'message';
                message.textContent = '';
                showCelebration();
            } else {
                message.textContent = '❌ 不对哦，再想想～';
                message.className = 'message error show';
                input.value = '';
                input.focus();
            }
        }

        function showCelebration() {
            document.getElementById('celebration').classList.add('show');
            launchConfetti();
        }

        function closeCelebration() {
            document.getElementById('celebration').classList.remove('show');
            document.getElementById('confettiContainer').innerHTML = '';
            document.getElementById('answerInput').value = '';
            document.getElementById('answerInput').focus();
        }

        function launchConfetti() {
            const container = document.getElementById('confettiContainer');
            const colors = ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#54a0ff', '#5f27cd', '#01a3a4', '#f368e0'];

            for (let i = 0; i < 60; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.top = '-10px';
                confetti.style.width = (Math.random() * 8 + 4) + 'px';
                confetti.style.height = (Math.random() * 8 + 4) + 'px';
                confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                confetti.style.animationDelay = Math.random() * 1.5 + 's';
                confetti.style.animationDuration = (Math.random() * 1 + 2) + 's';
                container.appendChild(confetti);
            }
        }

        // 回车键提交
        document.getElementById('answerInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                checkAnswer();
            }
        });
    </script>
</body>
</html>
